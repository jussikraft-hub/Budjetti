<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

    <script>
        // === Globaalit muuttujat ===
        let currentTranspose = 0;
        let lastFormattedHtml = '';
        let lastTransposedText = '';

        // === DOM Elementit ===
        const Elements = {
            inputText: document.getElementById('inputText'),
            convertButton: document.getElementById('convertButton'),
            printButton: document.getElementById('printButton'),
            copyButton: document.getElementById('copyButton'),
            outputSheetWrapper: document.getElementById('outputSheetWrapper'),
            outputSheet: document.getElementById('outputSheet'),
            outputContent: document.getElementById('formattedContent'),
            previewTitleHeader: document.getElementById('previewTitleHeader'),
            previewSongTitle: document.getElementById('previewSongTitle'),
            previewArtistName: document.getElementById('previewArtistName'),
            previewInfo: document.getElementById('previewInfo'),
            transposeDownBtn: document.getElementById('transposeDown'),
            transposeUpBtn: document.getElementById('transposeUp'),
            transposeValueSpan: document.getElementById('transposeValue'),
            songTitleInput: document.getElementById('songTitleInput'),
            artistNameInput: document.getElementById('artistNameInput'),
            capoInput: document.getElementById('capoInput'),
            tempoInput: document.getElementById('tempoInput'),
            infoInput: document.getElementById('infoInput'),
            mainFontSelect: document.getElementById('mainFontSelect'),
            titleFont: document.getElementById('titleFont'),
            titleSize: document.getElementById('titleSize'),
            titleColor: document.getElementById('titleColor'),
            artistFont: document.getElementById('artistFont'),
            artistSize: document.getElementById('artistSize'),
            artistColor: document.getElementById('artistColor'),
            infoFont: document.getElementById('infoFont'),
            infoSize: document.getElementById('infoSize'),
            infoColor: document.getElementById('infoColor'),
            chordSize: document.getElementById('chordSize'),
            chordColor: document.getElementById('chordColor'),
            lyricSize: document.getElementById('lyricSize'),
            lyricColor: document.getElementById('lyricColor'),
            sectionHeaderFont: document.getElementById('sectionHeaderFont'),
            sectionHeaderSize: document.getElementById('sectionHeaderSize'),
            sectionHeaderColor: document.getElementById('sectionHeaderColor'),
            previewSizeSelect: document.getElementById('previewSize'),
            formatToggles: document.querySelectorAll('.format-toggle'),
            controls: document.querySelectorAll('.left-panel select, .left-panel input, .left-panel textarea, .left-panel button.format-toggle')
        };

        // === Transponointilogiikka ===
        const scaleSharp = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const scaleFlat = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
        const sharpToFlat = {'C#':'Db', 'D#':'Eb', 'F#':'Gb', 'G#':'Ab', 'A#':'Bb'};
        const flatToSharp = {'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#'};
        function transposeNote(note, amount) { 
            if (!note) return ''; 
            const originalNote = note.toUpperCase(); 
            let root = originalNote[0]; 
            let accidental = ''; 
            if (originalNote.length > 1 && (originalNote[1] === '#' || originalNote[1] === 'B')) { 
                accidental = (originalNote[1] === 'B') ? 'b' : originalNote[1]; 
            } 
            if (accidental === 'b') { 
                const equivSharp = flatToSharp[root + accidental]; 
                if (equivSharp) { 
                    root = equivSharp[0]; 
                    accidental = '#'; 
                } else { 
                    if (root + accidental === 'CB') root = 'B'; 
                    else if (root + accidental === 'FB') root = 'E'; 
                    accidental = ''; 
                } 
            } 
            const noteWithSharp = root + (accidental === '#' ? '#' : ''); 
            let originalIndex = scaleSharp.indexOf(noteWithSharp); 
            if (originalIndex === -1) return note; 
            let newIndex = ((originalIndex + amount % 12) + 12) % 12; 
            let useFlat = (originalNote.length > 1 && originalNote[1] === 'B' && root !== 'C' && root !== 'F'); 
            const newNoteSharp = scaleSharp[newIndex]; 
            if (useFlat && newNoteSharp.includes('#')) { 
                return sharpToFlat[newNoteSharp] || newNoteSharp; 
            } else { 
                return newNoteSharp; 
            } 
        }
        function transposeChord(chord, amount) { 
            if (amount === 0) return chord; 
            const trimmedChord = chord.trim(); 
            if (!trimmedChord || trimmedChord === 'N.C.' || trimmedChord === '%') return chord; 
            const match = trimmedChord.match(/^([A-Ga-g])([#bB]?)([^/]*?)?(?:(\/)([A-Ga-g])([#bB]?))?$/); 
            if (!match) return chord; 
            const root = match[1]; 
            const accidental = match[2] || ''; 
            const quality = match[3] || ''; 
            const slash = match[4] || ''; 
            const bassRoot = match[5] || ''; 
            const bassAccidental = match[6] || ''; 
            const newRoot = transposeNote(root + accidental.replace('B','b'), amount); 
            const newBass = bassRoot ? transposeNote(bassRoot + bassAccidental.replace('B','b'), amount) : ''; 
            const leadingSpace = chord.match(/^\s*/)[0]; 
            const trailingSpace = chord.match(/\s*$/)[0]; 
            return leadingSpace + newRoot + quality + (newBass ? slash + newBass : '') + trailingSpace; 
        }

        // === Sointujen ja tekstin formatointi ===
        function isLikelyChordStandalone(segment) { 
            const cleanSegment = segment.replace(/\(.*?\)/g, '').trim(); 
            if (!cleanSegment) return false; 
            if (cleanSegment === '|' || cleanSegment === '-') return true; 
            const chordRegex = /^[A-Ga-g][#bB]?(m|min|m|M|maj|Maj|dim|aug|sus|add|°|ø|\d)*(\/[A-Ga-g][#bB]?)?(\(.*\))?$|^[A-Z]\.?C\.?$|^%$/; 
            return chordRegex.test(cleanSegment); 
        }
        function formatAndTransposeText(rawText, transposeAmount) {
            const lines = rawText.split('\n');
            const formattedLinesHtml = [];
            const transposedLinesText = [];
            const sectionHeaderRegex = /^\[(.*)\]$/;
            const metadataRegex = /^(tuning|capo|key|tempo|artist|title|tabbed by|email)\s*:/i;
            const onlyWhitespaceRegex = /^\s*$/;

            for (const line of lines) {
                let currentFormattedLine = line;
                let currentTransposedLine = line;
                const trimmedLine = line.trim();
                let isConfirmedChordLine = false;
                let isSpecialLine = false;

                if (onlyWhitespaceRegex.test(line)) {
                    currentTransposedLine = '';
                    isSpecialLine = true;
                } else if (sectionHeaderRegex.test(trimmedLine)) {
                    const headerContent = trimmedLine.match(sectionHeaderRegex)[1];
                    currentFormattedLine = `<span class="section-header">[${headerContent}]</span>`;
                    currentTransposedLine = `\n${trimmedLine}\n`;
                    isSpecialLine = true;
                } else if (metadataRegex.test(trimmedLine) || trimmedLine.startsWith('---') || trimmedLine.startsWith('===')) {
                    currentFormattedLine = `<span class="meta">${line}</span>`;
                    currentTransposedLine = '';
                    isSpecialLine = true;
                }

                if (!isSpecialLine) {
                    const parts = line.split(/(\s+)/).filter(Boolean);
                    let lineContainsOnlyChordsAndWhitespace = true;
                    let hasAnyChord = false;
                    let tempFormattedLine = '';
                    let tempTransposedLine = '';

                    for (const part of parts) {
                        if (onlyWhitespaceRegex.test(part)) {
                            tempFormattedLine += part;
                            tempTransposedLine += part;
                        } else {
                            const trimmedPart = part.trim();
                            const isChord = isLikelyChordStandalone(trimmedPart);
                            if (isChord) {
                                const transposed = transposeChord(trimmedPart, transposeAmount);
                                const leadingSpace = part.match(/^\s*/)[0];
                                const trailingSpace = part.match(/\s*$/)[0];
                                tempFormattedLine += `${leadingSpace}<span class="chord">${transposed}</span>${trailingSpace}`;
                                tempTransposedLine += part.replace(trimmedPart, transposed);
                                hasAnyChord = true;
                            } else {
                                lineContainsOnlyChordsAndWhitespace = false;
                                break;
                            }
                        }
                    }

                    if (lineContainsOnlyChordsAndWhitespace && hasAnyChord) {
                        isConfirmedChordLine = true;
                        currentFormattedLine = tempFormattedLine;
                        currentTransposedLine = tempTransposedLine;
                    }
                }

                formattedLinesHtml.push(currentFormattedLine);
                if (isConfirmedChordLine) {
                    transposedLinesText.push(currentTransposedLine.trimEnd());
                } else if (sectionHeaderRegex.test(trimmedLine)) {
                    transposedLinesText.push(currentTransposedLine.trimEnd());
                } else if (!isSpecialLine && !onlyWhitespaceRegex.test(line)) {
                    transposedLinesText.push(line.trimEnd());
                }
            }

            lastFormattedHtml = formattedLinesHtml.join('\n');
            finalizeTransposedText(transposedLinesText.join('\n'));
            return { html: lastFormattedHtml };
        }

        // === Tyylien päivitys ===
        function applyStyles() {
            const rootStyle = document.documentElement.style;
            const getFormatValue = (target, format) => { 
                const btn = document.querySelector(`.format-toggle[data-target='${target}'][data-format='${format}']`); 
                if (!btn) { 
                    console.warn(`Format toggle button not found for target: ${target}, format: ${format}`); 
                    if (format === 'bold') return 'normal'; 
                    if (format === 'italic') return 'normal'; 
                    if (format === 'underline') return 'none'; 
                    return ''; 
                } 
                const isActive = btn.classList.contains('active'); 
                if (format === 'bold') return isActive ? 'bold' : 'normal'; 
                if (format === 'italic') return isActive ? 'italic' : 'normal'; 
                if (format === 'underline') return isActive ? 'underline' : 'none'; 
                return ''; 
            };
            try {
                rootStyle.setProperty('--title-font-family', Elements.titleFont.value); 
                rootStyle.setProperty('--title-size', Elements.titleSize.value + 'px'); 
                rootStyle.setProperty('--title-color', Elements.titleColor.value); 
                rootStyle.setProperty('--title-weight', getFormatValue('title', 'bold')); 
                rootStyle.setProperty('--title-style', getFormatValue('title', 'italic')); 
                rootStyle.setProperty('--title-decoration', getFormatValue('title', 'underline'));
                rootStyle.setProperty('--artist-font-family', Elements.artistFont.value); 
                rootStyle.setProperty('--artist-size', Elements.artistSize.value + 'px'); 
                rootStyle.setProperty('--artist-color', Elements.artistColor.value); 
                rootStyle.setProperty('--artist-weight', getFormatValue('artist', 'bold')); 
                rootStyle.setProperty('--artist-style', getFormatValue('artist', 'italic')); 
                rootStyle.setProperty('--artist-decoration', getFormatValue('artist', 'underline'));
                rootStyle.setProperty('--info-font-family', Elements.infoFont.value); 
                rootStyle.setProperty('--info-size', Elements.infoSize.value + 'px'); 
                rootStyle.setProperty('--info-color', Elements.infoColor.value); 
                rootStyle.setProperty('--info-weight', getFormatValue('info', 'bold')); 
                rootStyle.setProperty('--info-style', getFormatValue('info', 'italic')); 
                rootStyle.setProperty('--info-decoration', getFormatValue('info', 'underline'));
                rootStyle.setProperty('--main-font-family', Elements.mainFontSelect.value);
                rootStyle.setProperty('--chord-size', Elements.chordSize.value + 'px'); 
                rootStyle.setProperty('--chord-color', Elements.chordColor.value); 
                rootStyle.setProperty('--chord-weight', getFormatValue('chord', 'bold')); 
                rootStyle.setProperty('--chord-style', getFormatValue('chord', 'italic')); 
                rootStyle.setProperty('--chord-decoration', getFormatValue('chord', 'underline'));
                rootStyle.setProperty('--lyric-size', Elements.lyricSize.value + 'px'); 
                rootStyle.setProperty('--lyric-color', Elements.lyricColor.value); 
                rootStyle.setProperty('--lyric-weight', getFormatValue('lyric', 'bold')); 
                rootStyle.setProperty('--lyric-style', getFormatValue('lyric', 'italic')); 
                rootStyle.setProperty('--lyric-decoration', getFormatValue('lyric', 'underline'));
                rootStyle.setProperty('--section-header-font-family', Elements.sectionHeaderFont.value); 
                rootStyle.setProperty('--section-header-size', Elements.sectionHeaderSize.value + 'px'); 
                rootStyle.setProperty('--section-header-color', Elements.sectionHeaderColor.value); 
                rootStyle.setProperty('--section-header-weight', getFormatValue('sectionHeader', 'bold')); 
                rootStyle.setProperty('--section-header-style', getFormatValue('sectionHeader', 'italic')); 
                rootStyle.setProperty('--section-header-decoration', getFormatValue('sectionHeader', 'underline'));
                Elements.outputSheetWrapper.className = Elements.previewSizeSelect.value;
            } catch (error) { 
                console.error("Virhe tyylejä asettaessa (applyStyles):", error); 
            }
        }

        // === Header & Info Päivitys ===
        function updatePreviewHeadersAndInfo() { 
            const title = Elements.songTitleInput.value.trim(); 
            const artist = Elements.artistNameInput.value.trim(); 
            Elements.previewSongTitle.textContent = title; 
            Elements.previewArtistName.textContent = artist; 
            Elements.previewTitleHeader.style.display = (title || artist) ? 'block' : 'none'; 
            let infoText = ''; 
            const capo = Elements.capoInput.value; 
            const tempo = Elements.tempoInput.value; 
            const otherInfo = Elements.infoInput.value.trim(); 
            if (capo) infoText += `Capo: ${capo}\n`; 
            if (tempo) infoText += `Tempo: ${tempo} BPM\n`; 
            if (otherInfo) infoText += `${otherInfo}\n`; 
            Elements.previewInfo.textContent = infoText.trim(); 
            Elements.previewInfo.style.display = infoText.trim() ? 'block' : 'none'; 
            Elements.previewTitleHeader.style.borderBottom = (title || artist) && infoText.trim() ? '1px solid #eee' : 'none'; 
            Elements.previewInfo.style.borderBottom = infoText.trim() ? '1px solid #eee' : 'none'; 
        }

        // === Muodosta lopullinen tekstiversio leikepöydälle ===
        function finalizeTransposedText(songBodyText) { 
            let clipboardText = ''; 
            const title = Elements.songTitleInput.value.trim(); 
            const artist = Elements.artistNameInput.value.trim(); 
            const capo = Elements.capoInput.value; 
            const tempo = Elements.tempoInput.value; 
            const otherInfo = Elements.infoInput.value.trim(); 
            if (title) clipboardText += title + '\n'; 
            if (artist) clipboardText += artist + '\n'; 
            if (title || artist) clipboardText += '\n'; 
            if (capo) clipboardText += `Capo: ${capo}\n`; 
            if (tempo) clipboardText += `Tempo: ${tempo} BPM\n`; 
            if (otherInfo) clipboardText += `${otherInfo}\n`; 
            if (capo || tempo || otherInfo) clipboardText += '\n'; 
            clipboardText += songBodyText; 
            lastTransposedText = clipboardText; 
        }

        // === Päivitä Esikatselu -funktio ===
        function updatePreview() { 
            try { 
                const rawText = Elements.inputText.value; 
                const { html } = formatAndTransposeText(rawText, currentTranspose); 
                Elements.outputContent.innerHTML = html; 
                updatePreviewHeadersAndInfo(); 
                applyStyles(); 
            } catch (error) { 
                console.error("Virhe esikatselua päivittäessä (updatePreview):", error); 
                alert("Virhe esikatselun päivittämisessä. Tarkista syöte ja konsoli."); 
            } 
        }

        // === Tapahtumankuuntelijat ===
        Elements.convertButton.addEventListener('click', updatePreview);
        Elements.transposeDownBtn.addEventListener('click', () => { 
            currentTranspose--; 
            Elements.transposeValueSpan.textContent = currentTranspose > 0 ? `+${currentTranspose}` : currentTranspose; 
            updatePreview(); 
        });
        Elements.transposeUpBtn.addEventListener('click', () => { 
            currentTranspose++; 
            Elements.transposeValueSpan.textContent = currentTranspose > 0 ? `+${currentTranspose}` : currentTranspose; 
            updatePreview(); 
        });
        [Elements.songTitleInput, Elements.artistNameInput, Elements.capoInput, Elements.tempoInput, Elements.infoInput].forEach(input => { 
            input.addEventListener('input', () => { 
                updatePreviewHeadersAndInfo(); 
                if (lastFormattedHtml) { 
                    try { 
                        formatAndTransposeText(Elements.inputText.value, currentTranspose); 
                    } catch(e){ 
                        console.error("Error updating clipboard text:", e);
                    } 
                } 
            }); 
        });
        Elements.formatToggles.forEach(button => { 
            button.addEventListener('click', () => { 
                button.classList.toggle('active'); 
                applyStyles(); 
            }); 
        });
        Elements.controls.forEach(control => { 
            if (!control.classList.contains('format-toggle')) { 
                const eventType = (control.tagName === 'SELECT' || control.type === 'color') ? 'change' : 'input'; 
                control.addEventListener(eventType, applyStyles); 
            } 
        });
        Elements.copyButton.addEventListener('click', async () => { 
            if (!lastTransposedText && !Elements.inputText.value && !Elements.songTitleInput.value && !Elements.artistNameInput.value) { 
                alert("Ei kopioitavaa sisältöä."); 
                return; 
            } 
            if (!lastTransposedText) { 
                try{ 
                    formatAndTransposeText(Elements.inputText.value, currentTranspose); 
                } catch(e){ 
                    alert('Virhe tekstin muodostamisessa kopiointia varten.'); 
                    return; 
                } 
            } 
            try { 
                await navigator.clipboard.writeText(lastTransposedText); 
                Elements.copyButton.textContent = 'Kopioitu!'; 
                Elements.copyButton.classList.add('copied'); 
                setTimeout(() => { 
                    Elements.copyButton.textContent = 'Kopioi leikepöydälle'; 
                    Elements.copyButton.classList.remove('copied'); 
                }, 1500); 
            } catch (err) { 
                console.error('Kopiointi epäonnistui: ', err); 
                alert('Kopiointi epäonnistui.'); 
            } 
        });
        Elements.printButton.addEventListener('click', () => { 
            if (!lastFormattedHtml && !Elements.inputText.value && !Elements.songTitleInput.value && !Elements.artistNameInput.value) { 
                alert("Ei tulostettavaa sisältöä."); 
                return; 
            } 
            if (!lastFormattedHtml) { 
                try { 
                    const { html } = formatAndTransposeText(Elements.inputText.value, currentTranspose); 
                    lastFormattedHtml = html; 
                } catch(e){ 
                    alert('Virhe tekstin muodostamisessa tulostusta varten.'); 
                    return; 
                } 
            } 
            const computedStyle = window.getComputedStyle(document.documentElement); 
            const getStyleVar = (varName) => computedStyle.getPropertyValue(varName).trim(); 
            let printWindowHtml = `<!DOCTYPE html><html lang="fi"><head><meta charset="UTF-8"><title>Tuloste</title><style>@page { margin: 10mm; } body { margin: 0; } .title-header h2 { font-family: ${getStyleVar('--title-font-family')}; font-size: ${getStyleVar('--title-size')}; color: ${getStyleVar('--title-color')}; font-weight: ${getStyleVar('--title-weight')}; font-style: ${getStyleVar('--title-style')}; text-decoration: ${getStyleVar('--title-decoration')}; text-align: ${getStyleVar('--title-align')}; margin: 0 0 5px 0; } .title-header h3 { font-family: ${getStyleVar('--artist-font-family')}; font-size: ${getStyleVar('--artist-size')}; color: ${getStyleVar('--artist-color')}; font-weight: ${getStyleVar('--artist-weight')}; font-style: ${getStyleVar('--artist-style')}; text-decoration: ${getStyleVar('--artist-decoration')}; text-align: ${getStyleVar('--artist-align')}; margin: 0; } .info-header { font-family: ${getStyleVar('--info-font-family')}; font-size: ${getStyleVar('--info-size')}; color: ${getStyleVar('--info-color')}; font-weight: ${getStyleVar('--info-weight')}; font-style: ${getStyleVar('--info-style')}; text-decoration: ${getStyleVar('--info-decoration')}; white-space: pre-wrap; line-height: 1.5; margin: 15px 0; padding-bottom: 10px; border-bottom: 1px solid #eee; } pre { font-family: ${getStyleVar('--main-font-family')}; line-height: ${getStyleVar('--line-height')}; margin: 0; white-space: pre-wrap; word-wrap: break-word; font-size: ${getStyleVar('--lyric-size')}; color: ${getStyleVar('--lyric-color')}; font-weight: ${getStyleVar('--lyric-weight')}; font-style: ${getStyleVar('--lyric-style')}; text-decoration: ${getStyleVar('--lyric-decoration')}; } .chord { font-family: inherit; font-size: ${getStyleVar('--chord-size')}; color: ${getStyleVar('--chord-color')}; font-weight: ${getStyleVar('--chord-weight')}; font-style: ${getStyleVar('--chord-style')}; text-decoration: ${getStyleVar('--chord-decoration')}; } .section-header { display: block; margin: 0.8em 0 0.3em 0; font-family: ${getStyleVar('--section-header-font-family')}; font-size: ${getStyleVar('--section-header-size')}; color: ${getStyleVar('--section-header-color')}; font-weight: ${getStyleVar('--section-header-weight')}; font-style: ${getStyleVar('--section-header-style')}; text-decoration: ${getStyleVar('--section-header-decoration')}; line-height: 1.4; } .meta { font-style: italic; color: #777; font-size: 0.9em; font-family: sans-serif; } @media print { body { margin: 0; } .title-header h2, .title-header h3, .info-header, pre, .chord, .section-header, .meta { color: #000 !important; } } </style></head><body>`; 
            const title = Elements.songTitleInput.value.trim(); 
            const artist = Elements.artistNameInput.value.trim(); 
            if(title || artist) { 
                printWindowHtml += `<div class="title-header">`; 
                if(title) printWindowHtml += `<h2>${title}</h2>`; 
                if(artist) printWindowHtml += `<h3>${artist}</h3>`; 
                printWindowHtml += `</div>`; 
            } 
            let infoText = ''; 
            const capo = Elements.capoInput.value; 
            const tempo = Elements.tempoInput.value; 
            const otherInfo = Elements.infoInput.value.trim(); 
            if (capo) infoText += `Capo: ${capo}\n`; 
            if (tempo) infoText += `Tempo: ${tempo} BPM\n`; 
            if (otherInfo) infoText += `${otherInfo}\n`; 
            if(infoText.trim()){ 
                printWindowHtml += `<div class="info-header">${infoText.trim().replace(/</g, "<").replace(/>/g, ">")}</div>`; 
            } 
            printWindowHtml += `<pre>${lastFormattedHtml}</pre></body></html>`; 
            const printWindow = window.open('', '_blank'); 
            if (printWindow) { 
                printWindow.document.open(); 
                printWindow.document.write(printWindowHtml); 
                printWindow.document.close(); 
                printWindow.focus(); 
            } else { 
                alert("Ponnahdusikkunoiden esto saattaa olla päällä."); 
            } 
        });
